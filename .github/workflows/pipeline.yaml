name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  GO_VERSION: "1.24"
  COVERAGE_THRESHOLD: "60"

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache-dependency-path: backend/go.sum

    - name: Download dependencies
      working-directory: backend
      run: go mod download

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        working-directory: backend
        args: --timeout=5m

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Lint
      working-directory: frontend
      run: npm run lint

  validate-migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bookstore_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Install Atlas
      run: curl -sSf https://atlasgo.sh | sh

    - name: Validate migrations
      working-directory: backend
      env:
        DB_DSN: postgres://postgres:postgres@localhost:5432/bookstore_test?sslmode=disable
      run: atlas migrate validate --env local

  test_backend:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: [ lint-backend ]

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache-dependency-path: backend/go.sum

    - name: Download dependencies
      working-directory: backend
      run: go mod download

    - name: Run tests
      working-directory: backend
      run: |
        go test ./... -race \
          -coverprofile=coverage.out \
          -coverpkg=./handlers/...,./internal/...

    - name: Check coverage threshold
      working-directory: backend
      run: |
        TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "Total coverage: $TOTAL%"
        awk "BEGIN {exit !($TOTAL >= $COVERAGE_THRESHOLD)}"

